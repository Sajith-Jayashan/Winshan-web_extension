name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start containers
        run: docker-compose up --build -d

      - name: Wait for backend to be ready
        run: sleep 10

      - name: Test shorten endpoint
        run: |
          curl -f http://localhost:3000/shorten \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"url":"https://google.com"}' || exit 1

      - name: Tear down
        run: docker-compose down -v